{% extends "base.html" %}

{% block content %}
<div class="flex flex-col xl:flex-row gap-6 h-[calc(100vh-160px)]">
    
    <!-- ВИЗУАЛЬНЫЙ НАВИГАТОР -->
    <div class="flex-1 bg-white dark:bg-darkCard rounded-[32px] shadow-sm border border-gray-100 dark:border-gray-700 relative overflow-hidden flex items-center justify-center p-8 transition-all">
        
        <!-- ТОТ САМЫЙ ЗАДНИЙ ФОН (ТЕХНО-СЕТКА) -->
        <div class="absolute inset-0 bg-[#F8FAFC] dark:bg-darkBg opacity-100 shadow-inner">
            <div class="absolute inset-0 bg-[radial-gradient(#e2e8f0_1.5px,transparent_1.5px)] dark:bg-[radial-gradient(#334155_1.5px,transparent_1.5px)] [background-size:24px_24px]"></div>
            <!-- Дополнительные линии HUD -->
            <div class="absolute inset-0 opacity-20 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:120px_120px]"></div>
        </div>
        
        <div class="relative w-full max-w-lg aspect-square flex items-center justify-center">
            
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <span class="text-[90px] font-black text-[#0055A4]/[0.05] dark:text-blue-500/[0.05] uppercase tracking-tighter -rotate-12 italic select-none">NAVIGATOR</span>
            </div>

            <!-- МЕТКА 1: БАКИНСКАЯ (ГЛАВНЫЙ) -->
            <div class="absolute top-[30%] left-[45%] group cursor-pointer z-10" onclick="selectBuilding('bakin')">
                <div class="absolute -inset-4 bg-blue-500/20 rounded-full animate-ping"></div>
                <div class="relative bg-[#0055A4] w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-[0_12px_24px_rgba(0,85,164,0.3)] group-hover:scale-110 transition-all border-2 border-white/20">
                    <i data-lucide="graduation-cap" class="w-7 h-7"></i>
                </div>
            </div>

            <!-- МЕТКА 2: МЕЧНИКОВА / ЕПИШИНА -->
            <div class="absolute bottom-[30%] left-[25%] group cursor-pointer z-10" onclick="selectBuilding('mech')">
                <div class="absolute -inset-4 bg-orange-500/20 rounded-full animate-ping [animation-delay:0.5s]"></div>
                <div class="relative bg-orange-500 w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-[0_12px_24px_rgba(249,115,22,0.3)] group-hover:scale-110 transition-all border-2 border-white/20">
                    <i data-lucide="building" class="w-7 h-7"></i>
                </div>
            </div>

            <!-- МЕТКА 3: НАЧАЛОВСКОЕ ШОССЕ -->
            <div class="absolute top-[50%] right-[15%] group cursor-pointer z-10" onclick="selectBuilding('nachalo')">
                <div class="absolute -inset-4 bg-purple-500/20 rounded-full animate-ping [animation-delay:1s]"></div>
                <div class="relative bg-purple-600 w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-[0_12px_24px_rgba(147,51,234,0.3)] group-hover:scale-110 transition-all border-2 border-white/20">
                    <i data-lucide="microscope" class="w-7 h-7"></i>
                </div>
            </div>
        </div>

        <div class="absolute bottom-10 left-10 flex flex-col gap-1 z-20">
            <span class="text-[11px] font-black text-[#0055A4] dark:text-blue-400 uppercase tracking-[0.3em] italic">Навигатор кампуса</span>
            <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest opacity-60 italic">Interactive ASMU Eco-System</span>
        </div>
    </div>

    <!-- ИНФО-ПАНЕЛЬ -->
    <div class="w-full xl:w-96 bg-white dark:bg-darkCard rounded-[32px] p-8 shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col transition-all overflow-hidden relative">
        <div id="buildingInfo" class="animate-fadeIn">
            <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/30 rounded-2xl flex items-center justify-center text-[#0055A4] dark:text-blue-400 mb-8 shadow-inner">
                <i data-lucide="navigation-2" class="w-8 h-8 italic"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-800 dark:text-white uppercase tracking-tighter mb-4 italic">Локатор</h2>
            <p class="text-[10px] font-black text-gray-400 leading-relaxed italic uppercase tracking-[0.1em] border-l-2 border-blue-500 pl-4 py-2">
                Выберите объект на схеме для получения точных данных и маршрута.
            </p>
        </div>

        <div id="selectedDetails" class="hidden h-full flex flex-col animate-fadeIn">
            <div class="flex-1">
                <div id="bBadge" class="inline-block px-3 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest mb-6 shadow-sm italic"></div>
                <h3 id="bTitle" class="text-xl font-black text-gray-800 dark:text-white uppercase tracking-tighter mb-2 italic"></h3>
                <p id="bAddress" class="text-[10px] font-bold text-[#0055A4] dark:text-blue-400 uppercase tracking-widest mb-10 flex items-center gap-2 italic">
                    <i data-lucide="map-pin" class="w-3 h-3 italic"></i> <span></span>
                </p>
                <div class="bg-[#F8FAFC] dark:bg-slate-800/50 p-6 rounded-[24px] border border-gray-100 dark:border-gray-700 shadow-inner">
                    <h5 class="text-[9px] font-black text-gray-400 uppercase tracking-[0.3em] mb-4 flex items-center gap-2 italic font-bold">Состав объекта:</h5>
                    <ul id="bFeatures" class="text-xs font-bold text-gray-700 dark:text-gray-300 space-y-2 italic uppercase tracking-tighter"></ul>
                </div>
            </div>
            <a id="bLink" href="#" target="_blank" class="w-full bg-gray-900 text-white py-5 rounded-[22px] font-black text-center uppercase tracking-[0.15em] text-[10px] hover:bg-black transition-all shadow-xl shadow-gray-200 mt-auto flex items-center justify-center gap-2 italic italic">
                Построить маршрут <i data-lucide="external-link" class="w-4 h-4 italic italic"></i>
            </a>
        </div>
    </div>
</div>

<script>
    const buildings = {
        bakin: {
            title: "Главный корпус АГМУ",
            address: "ул. Бакинская, 121",
            badge: "Центральный кампус",
            badgeClass: "bg-blue-100 text-[#0055A4] border border-blue-200",
            features: ["Ректорат", "Библиотека", "ГИА / Аттестация", "Кафедра анатомии"],
            link: "https://yandex.com/maps/-/CPrVeE0d"
        },
        mech: {
            title: "Учебный корпус №2",
            address: "ул. Мечникова / Епишина",
            badge: "Учебный блок",
            badgeClass: "bg-orange-100 text-orange-600 border border-orange-200",
            features: ["Аудитории А1-А5", "Студенческий совет", "Метод. кабинет"],
            link: "https://yandex.com/maps/-/CPrVeG~A"
        },
        nachalo: {
            title: "Научный комплекс",
            address: "Началовское шоссе, 9/1",
            badge: "НИИ / Лаборатории",
            badgeClass: "bg-purple-100 text-purple-600 border border-purple-200",
            features: ["Кафедра Микробиологии", "Виварий", "Нарко. центр"],
            link: "https://yandex.com/maps/-/CPrVi0jL"
        }
    };

    function selectBuilding(id) {
        const data = buildings[id];
        document.getElementById('buildingInfo').classList.add('hidden');
        document.getElementById('selectedDetails').classList.remove('hidden');
        const badge = document.getElementById('bBadge');
        badge.innerText = data.badge;
        badge.className = `inline-block px-3 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest mb-6 shadow-sm italic ${data.badgeClass}`;
        document.getElementById('bTitle').innerText = data.title;
        document.getElementById('bAddress').querySelector('span').innerText = data.address;
        document.getElementById('bLink').href = data.link;
        const featuresList = document.getElementById('bFeatures');
        featuresList.innerHTML = data.features.map(f => `<li>• ${f}</li>`).join('');
        lucide.createIcons();
    }
</script>
{% endblock %}
